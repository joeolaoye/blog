{{ define "header" }}{{ partials.Include "site-header.html" . }}{{ end }}

{{ define "main" }}
  <article class="mw7 center ph3 pv4 pv5-ns">
    <header class="mb4">
      <h1 class="f1 mt0 mb2" style="font-weight:700;letter-spacing:-0.022em;line-height:1.1;">{{ .Title }}</h1>
      {{ with .Params.subtitle }}
        <p class="f4 ma0" style="font-family:var(--jo-font-serif);color:var(--jo-muted);">{{ . }}</p>
      {{ end }}
    </header>
    <div class="jo-prose">
      {{ .Content }}
    </div>
  </article>
{{ end }}
